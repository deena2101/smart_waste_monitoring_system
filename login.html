<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoWaste - Login</title>
    <meta name="description" content="Login to EcoWaste Smart Monitoring System">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>

<body class="login-body">
    <div class="login-container">
        <!-- Left side: Branding -->
        <div class="login-brand">
            <div class="brand-content">
                <div class="brand-icon-large">
                    <i class="fa-solid fa-leaf"></i>
                </div>
                <h1>Eco<span>Waste</span></h1>
                <p>Smart Waste Monitoring System</p>
                <div class="brand-features">
                    <div class="feature"><i class="fa-solid fa-check-circle"></i> Real-time bin tracking</div>
                    <div class="feature"><i class="fa-solid fa-check-circle"></i> Automated route optimization</div>
                    <div class="feature"><i class="fa-solid fa-check-circle"></i> Eco-friendly community</div>
                </div>
            </div>
        </div>

        <!-- Right side: Login Form -->
        <div class="login-form-container">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Please select your login role to continue.</p>
            </div>

            <!-- Role Toggle -->
            <div class="role-toggle">
                <button type="button" class="role-btn active" id="btn-worker" onclick="switchRole('worker')">
                    <i class="fa-solid fa-user-gear"></i> Worker
                </button>
                <button type="button" class="role-btn" id="btn-admin" onclick="switchRole('admin')">
                    <i class="fa-solid fa-shield-halved"></i> Admin
                </button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="username">Email Address or ID</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="text" id="username" placeholder="worker@ecowaste.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-pass" onclick="handleForgotPassword()">Forgot Password?</a>
                </div>
                <!-- Error Message Container hidden by default -->
                <div id="error-message"
                    style="display: none; color: #ef4444; font-size: 0.9rem; margin-top: -15px; margin-bottom: 20px; font-weight: 500;">
                    <i class="fa-solid fa-circle-exclamation"></i> Email id and password does not match
                </div>
                <button type="submit" class="btn btn-primary login-submit-btn">
                    Login to Dashboard <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Login Logic -->
    <script>
        let currentRole = 'worker';

        function switchRole(role) {
            currentRole = role;

            // Clear any error messages when switching tabs
            document.getElementById('error-message').style.display = 'none';

            // Update buttons visually
            document.getElementById('btn-worker').classList.toggle('active', role === 'worker');
            document.getElementById('btn-admin').classList.toggle('active', role === 'admin');

            // Update placeholders & subtle hints dynamically
            const usernameInput = document.getElementById('username');
            if (role === 'admin') {
                usernameInput.placeholder = 'admin@ecowaste.com';
            } else {
                usernameInput.placeholder = 'worker1@ecowaste.com';
            }
        }

        function handleForgotPassword() {
            alert('A password reset link has been sent to your registered email address.');
        }

        function handleLogin(e) {
            e.preventDefault(); // Prevent standard form submission

            const usernameInputValue = document.getElementById('username').value.trim();
            const passwordInputValue = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('error-message');
            const formBtn = document.querySelector('.login-submit-btn');

            errorMessage.style.display = 'none'; // Hide error initially

            // Pre-defined Confidential Credentials
            const adminCredentials = {
                id: 'admin@ecowaste.com',
                password: 'adminPassword123!'
            };

            const workerCredentials = {
                id: 'worker1@ecowaste.com', // Unique ID for worker 1
                password: 'Worker1Password!'
            };

            let isValid = false;

            if (currentRole === 'admin') {
                if (usernameInputValue === adminCredentials.id && passwordInputValue === adminCredentials.password) {
                    isValid = true;
                }
            } else if (currentRole === 'worker') {
                if (usernameInputValue === workerCredentials.id && passwordInputValue === workerCredentials.password) {
                    isValid = true;
                }
            }

            if (isValid) {
                formBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
                formBtn.disabled = true;

                // Simulate API logic delay
                setTimeout(() => {
                    if (currentRole === 'admin') {
                        window.location.href = 'index.html'; // Admin Dashboard
                    } else {
                        window.location.href = 'worker_dashboard.html'; // Worker Dashboard
                    }
                }, 1200);
            } else {
                // If wrong password or email, show exact requested message
                errorMessage.style.display = 'block';
            }
        }
    </script>
</body>

</html>
